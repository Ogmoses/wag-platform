<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WAG Enterprises</title>
  <script>
    // GitHub Pages SPA redirect
    // When a user navigates directly to a deep URL, Pages returns 404.
    // This script redirects to the root with the path encoded as a query param,
    // which the script in index.html decodes and restores.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?/' +
      l.pathname.slice(1) +
      (l.search ? '&' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p style="font-family:system-ui;color:#64748b;text-align:center;margin-top:40px">
    Redirecting…
  </p>
</body>
</html>
